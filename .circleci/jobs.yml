  # ---------------------------------------------------------------------------
  # E2E (Cypress)
  # ---------------------------------------------------------------------------

  e2e_test_mon_pix:
    executor:
      name: node-browsers-redis-postgres-docker
    parallelism: 4
    working_directory: ~/pix/high-level-tests/e2e
    steps:
      - run:
          name: Skip if not needed
          command: |
            if [[ "$CIRCLE_BRANCH" != "dev" ]] && [[ "<< pipeline.parameters.run-mon-pix >>" == "false" ]] && [[ "<< pipeline.parameters.run-api >>" == "false" ]] && [[ "<< pipeline.parameters.run-e2e-cypress >>" == "false" ]]; then
              circleci step halt
            fi
      - run: sudo apt-get update -y
      - browser-tools/install-chrome
      - run:
          name: Manual safety start of X11 server
          command: |
            set +e
            Xvfb :99 -screen 0 1280x1024x24 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "Xvfb started successfully"
            else
              echo "Xvfb is already running"
            fi
          background: true
      - attach_workspace:
          at: ~/pix
      - npm_install_cypress_with_cache:
          cache_key: e2e
      - run:
          name: Lint
          command: npm run lint
      - run:
          working_directory: ~/pix/api
          command: cat package*.json > cachekey
      - restore_cache:
          keys:
            - v8-api-npm-{{ checksum "~/pix/api/cachekey" }}
      - run:
          name: Install Pix API
          working_directory: ~/pix/api
          command: npm ci
      - run:
          name: Prepare database
          working_directory: ~/pix/api
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
          command: npm run db:prepare
      - run:
          name: Refresh cache
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
          working_directory: ~/pix/api
          command: npm run cache:refresh
      - run:
          name: Prepare datamart
          command: npm run datamart:prepare
          working_directory: ~/pix/api
          environment:
            DATAMART_DATABASE_URL: postgres://circleci@localhost:5432/circleci_datamart
      - run:
          name: Start Pix API
          working_directory: ~/pix/api
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            DATAMART_DATABASE_URL: postgres://circleci@localhost:5432/circleci_datamart
            REDIS_URL: 'redis://localhost:6379'
            START_JOB_IN_WEB_PROCESS: 'true'
          background: true
          command: npm start
      - run:
          name: Start Pix App
          working_directory: ~/pix/mon-pix
          command: npx ember serve --path=./dist --proxy=http://localhost:3000
          background: true
      - run:
          name: Run tests
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
          command: npm run test:ci:app
      - store_test_results:
          path: /home/circleci/test-results

  e2e_test_orga:
    executor:
      name: node-browsers-redis-postgres-docker
    working_directory: ~/pix/high-level-tests/e2e
    steps:
      - run:
          name: Skip if not needed
          command: |
            if [[ "$CIRCLE_BRANCH" != "dev" ]] && [[ "<< pipeline.parameters.run-orga >>" == "false" ]] && [[ "<< pipeline.parameters.run-api >>" == "false" ]] && [[ "<< pipeline.parameters.run-e2e-cypress >>" == "false" ]]; then
