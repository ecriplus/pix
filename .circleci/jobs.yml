  # ---------------------------------------------------------------------------
  # E2E (Playwright)
  # ---------------------------------------------------------------------------

  e2e_playwright_test:
    executor:
      name: playwright-executor-medium
    working_directory: ~/pix/high-level-tests/e2e-playwright
    parallelism: 4
    steps:
      - attach_workspace:
          at: ~/pix
      - npm_install_with_cache:
          cache_key: playwright
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Typescript
          command: npm run tsc
      - run:
          working_directory: ~/pix/api
          command: cat package*.json > cachekey
      - restore_cache:
          keys:
            - v8-api-npm-{{ checksum "~/pix/api/cachekey" }}
      - run:
          name: Install Pix API
          working_directory: ~/pix/api
          command: npm ci
      - run:
          name: Prepare database
          working_directory: ~/pix/api
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            DATAMART_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/circleci_datamart'
            DATAWAREHOUSE_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/circleci_datawarehouse'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            REDIS_URL: 'redis://localhost:6379'
            START_JOB_IN_WEB_PROCESS: 'true'
            AUTH_SECRET: 'secret'
            LCMS_API_RELEASE_ID: '2360?forCI'
            IS_RUNNING_PLAYWRIGHT: 'true'
          command: npm run db:prepare
      - run:
          name: Start Pix API
          working_directory: ~/pix/api
          command: npm start
          background: true
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            DATAMART_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/circleci_datamart'
            DATAWAREHOUSE_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/circleci_datawarehouse'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            REDIS_URL: 'redis://localhost:6379'
            START_JOB_IN_WEB_PROCESS: 'true'
            MAILING_ENABLED: 'false'
            AUTH_SECRET: 'secret'
            LCMS_API_RELEASE_ID: '2360?forCI'
            IS_RUNNING_PLAYWRIGHT: 'true'
            PIX_ASSETS_MANAGER_URL: 'https://assets.pix.org'
      - run:
          name: Start Pix Orga
          working_directory: ~/pix/orga
          command: npx vite preview
          background: true
      - run:
          name: Start Pix App
          working_directory: ~/pix/mon-pix
          command: npx ember serve --path=./dist --proxy=http://localhost:3000
          background: true
      - run:
          name: Start Pix Certif
          working_directory: ~/pix/certif
          command: npx ember serve --path=./dist --proxy=http://localhost:3000
          background: true
      - run:
          name: Refresh cache
          environment:
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            LCMS_API_RELEASE_ID: '2360?forCI'
            IS_RUNNING_PLAYWRIGHT: 'true'
          working_directory: ~/pix/api
          command: npm run cache:refresh
      - run:
          name: Run E2E tests
          command: |
            if [ "$CIRCLE_NODE_TOTAL" -eq 1 ]; then
              echo "Only one shard: run both parallel and serial tests"
              npx playwright test --grep-invert @runSerially
              npx playwright test --grep @runSerially --workers=1
            elif [ "$CIRCLE_NODE_INDEX" -eq 0 ]; then
              echo "Shard 0: run serial tests"
              npx playwright test --grep @runSerially --workers=1
            else
              SHARD="$((${CIRCLE_NODE_INDEX}+1))"
              echo "Shard $SHARD of $CIRCLE_NODE_TOTAL: run parallel tests"
              npx playwright test --grep-invert @runSerially --shard=${SHARD}/${CIRCLE_NODE_TOTAL}
            fi
          environment:
            PIX_API_PORT: 3000
            PIX_APP_URL: http://localhost:4200
            PIX_ORGA_URL: http://localhost:4201
            PIX_CERTIF_URL: http://localhost:4203
            DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            JOBS_DATABASE_URL: 'postgres://circleci@localhost:5432/circleci'
            AUTH_SECRET: 'secret'
            REDIRECTION_URL_SECRET: 'secret'
            NODE_OPTIONS: '--no-experimental-strip-types'
      - store_test_results:
          path: ./node_modules/.playwright/junit
      - store_artifacts:
          path: ./node_modules/.playwright/output
          destination: screenshots

