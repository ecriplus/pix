name: "Security Checks"

on:
  push:
    branches:
      - dev

jobs:
  upload_sboms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Cyclone DX
        # cycloneDX is installed as part of the first batch, sinnce we will have to make `npm ci` to fetch dependencies
        run: npm ci

      - name: Monorepo - Create SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-file pix-repo-sbom.json package.json && [ -e "pix-repo-sbom.json" ] && echo '[+] SBOM created' || echo '[!] Fail to create SBOM'

      - name: Monorepo - Upload BOM to Dependency-Track
        uses: DependencyTrack/gh-upload-sbom@48feab3080ff9e8f51f4d21861d9fc914eb744f5
        with:
          serverHostname: ${{ secrets.DEPENDENCYTRACK_HOSTNAME }}
          apiKey: ${{ secrets.DEPENDENCYTRACK_APIKEY }}
          projectName: Monorepo
          projectVersion: dev
          bomFilename: "pix-repo-sbom.json"
          autoCreate: true

      - name: Pix App - Create SBOM
        run: npm ci --prefix mon-pix/ && npx @cyclonedx/cyclonedx-npm --output-file pix-app-sbom.json mon-pix/package.json && [ -e "pix-app-sbom.json" ] && echo '[+] SBOM created' || echo '[!] Fail to create SBOM'

      - name: Pix App - Upload BOM to Dependency-Track
